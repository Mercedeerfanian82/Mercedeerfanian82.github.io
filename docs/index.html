<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mercede Erfanian | Neuroscientist & Researcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:#1a2744; --teal:#2a7f7f; --accent:#e8a020;
  --bg:#f8f9fc; --white:#fff; --text:#2d3748; --text-light:#718096;
}

html { scroll-behavior:smooth; }
section { scroll-margin-top: 70px; } /* FIX */

body {
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0;
  height:60px;
  background:rgba(26,39,68,0.97);
  display:flex; justify-content:space-between; align-items:center;
  padding:0 2rem;
  z-index:100;
}
.nav-links { display:flex; gap:1.5rem; list-style:none; }
.nav-links a { color:white; text-decoration:none; }

/* HERO */
.hero {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#1a2744,#1a5f5f);
  color:white; text-align:center;
  padding:6rem 2rem;
}

/* BASIC CLEAN */
.container { max-width:900px; margin:auto; }
section { padding:5rem 2rem; }

/* PUBLICATIONS */
.pub-item { margin-bottom:1rem; }

/* BUTTON */
.filter-btn {
  padding:5px 10px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:700px){
  .nav-links{ display:none; }
}
</style>
</head>

<body>

<nav>
  <div>Mercede Erfanian</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#publications">Publications</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div>
    <h1>Mercede Erfanian</h1>
    <p>Neuroscientist · ESSCA Lyon</p>
  </div>
</section>

<section id="about">
  <div class="container">
    <h2>About</h2>
    <p>Researcher in cognitive neuroscience and psychophysiology.</p>
  </div>
</section>

<section id="publications">
  <div class="container">
    <h2>Publications</h2>

    <button class="filter-btn" onclick="filterPubs('all')">All</button>
    <button class="filter-btn" onclick="filterPubs('decision')">Decision</button>
    <button class="filter-btn" onclick="filterPubs('hearing')">Hearing</button>

    <div class="pub-item" data-cat="decision">Decision paper</div>
    <div class="pub-item" data-cat="hearing">Hearing paper</div>

  </div>
</section>

<section id="contact">
  <div class="container">
    <h2>Contact</h2>
    <p>Email: mercedeh.erfanianghasab@essca.fr</p>
  </div>
</section>

<script>
function filterPubs(cat){
  const items = document.querySelectorAll('.pub-item');

  items.forEach(item => {
    if(cat === 'all'){
      item.style.display = 'block';
    } else {
      const cats = item.dataset.cat.split(' ');
      item.style.display = cats.includes(cat) ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
